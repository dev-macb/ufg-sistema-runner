name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            
          - os: windows
            arch: amd64
            ext: ".exe"

          - os: darwin
            arch: amd64
            ext: ""

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4


      - name: ⚙️ Configurar ambiente Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli-assinador/go.mod
          cache: true
          cache-dependency-path: apps/cli-assinador/go.sum


      - name: 🔐 Instalar Cosign
        uses: sigstore/cosign-installer@v3


      - name: 🔨 Compilar binário
        working-directory: apps/cli-assinador
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../../dist

          BINARY="assinatura-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          go build \
            -ldflags="-s -w -X main.versaoApp=${{ github.ref_name }}" \
            -o "../../dist/${BINARY}" \
            .

          echo "BINARY=${BINARY}" >> "$GITHUB_ENV"


      - name: 🔑 Gerar SHA256
        working-directory: dist
        run: |
          sha256sum "${{ env.BINARY }}" > "${{ env.BINARY }}.sha256"


      - name: ✍️ Assinar binário com Cosign
        working-directory: dist
        run: |
          cosign sign-blob \
            --yes \
            --output-signature "${{ env.BINARY }}.sig" \
            --output-certificate "${{ env.BINARY }}.pem" \
            "${{ env.BINARY }}"


      - name: 📦 Publicar artefatos no GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.BINARY }}
            dist/${{ env.BINARY }}.sha256
            dist/${{ env.BINARY }}.sig
            dist/${{ env.BINARY }}.pem
          generate_release_notes: true
